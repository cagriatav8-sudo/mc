<!DOCTYPE html>
<html>
<head>
    <title>Minecraft 1.8.8 Web</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
            margin: -10px 0 0 -10px; color: white; font-size: 24px;
            text-align: center; pointer-events: none; z-index: 10;
        }
        /* HUD - Kalpler ve Slotlar */
        #hud {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            pointer-events: none;
        }
        #hearts { color: #ff0000; font-size: 20px; margin-bottom: 5px; text-shadow: 2px 2px #000; }
        #hotbar { display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 5px; border: 2px solid #333; }
        .slot { width: 40px; height: 40px; border: 2px solid #888; display: flex; align-items: center; justify-content: center; background-size: cover; }
        .selected { border-color: #fff; box-shadow: 0 0 10px #fff; }

        /* Envanter Menüsü */
        #inventory {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 200px; background: #c6c6c6; border: 4px solid #555;
            display: none; grid-template-columns: repeat(4, 1fr); padding: 20px; gap: 10px;
        }
    </style>
</head>
<body>
    <div id="crosshair">+</div>
    <div id="hud">
        <div id="hearts">❤❤❤❤❤❤❤❤❤❤</div>
        <div id="hotbar">
            <div class="slot selected" id="s1" style="background-image:url('https://i.imgur.com/v6S7vS7.png')"></div>
            <div class="slot" id="s2" style="background-image:url('https://i.imgur.com/u7f3SEx.png')"></div>
            <div class="slot" id="s3" style="background-image:url('https://i.imgur.com/6S6P88X.png')"></div>
        </div>
    </div>
    <div id="inventory">
        <p style="grid-column: span 4; margin: 0;">Envanter (E ile Kapat)</p>
        <div class="slot" style="background-color: #55aa55;"></div>
        <div class="slot" style="background-color: #8B4513;"></div>
        <div class="slot" style="background-color: #808080;"></div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

        // Ses Efektleri
        const breakSound = new Audio('https://www.soundjay.com/nature/sounds/crunch-01.mp3');
        const placeSound = new Audio('https://www.soundjay.com/button/sounds/button-16.mp3');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // Retro görünüm için antialias kapalı
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let velocity = new THREE.Vector3(), direction = new THREE.Vector3();
        let isInventoryOpen = false;

        // Texture Yükleyici
        const loader = new THREE.TextureLoader();
        const grassTex = loader.load('https://i.imgur.com/v6S7vS7.png'); // Çim
        const dirtTex = loader.load('https://i.imgur.com/u7f3SEx.png');  // Toprak
        const stoneTex = loader.load('https://i.imgur.com/6S6P88X.png'); // Taş

        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const blocks = [];

        // Dünya Oluşturma (Texture'lı)
        function createWorld() {
            for(let x = -20; x < 20; x++) {
                for(let z = -20; z < 20; z++) {
                    const noise = Math.floor(Math.random() * 2);
                    const mat = (noise > 0.5) ? new THREE.MeshLambertMaterial({map: grassTex}) : new THREE.MeshLambertMaterial({map: stoneTex});
                    const cube = new THREE.Mesh(geometry, mat);
                    cube.position.set(x, noise, z);
                    scene.add(cube);
                    blocks.push(cube);
                }
            }
        }
        createWorld();

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        camera.position.y = 5;

        // Kontroller
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyE') {
                if(isInventoryOpen) {
                    controls.lock();
                    document.getElementById('inventory').style.display = 'none';
                } else {
                    controls.unlock();
                    document.getElementById('inventory').style.display = 'grid';
                }
                isInventoryOpen = !isInventoryOpen;
            }
            if(!isInventoryOpen) {
                if(e.code === 'KeyW') moveForward = true;
                if(e.code === 'KeyS') moveBackward = true;
                if(e.code === 'KeyA') moveLeft = true;
                if(e.code === 'KeyD') moveRight = true;
                if(e.code === 'Space' && canJump) { velocity.y += 5; canJump = false; }
            }
        });

        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveForward = false;
            if(e.code === 'KeyS') moveBackward = false;
            if(e.code === 'KeyA') moveLeft = false;
            if(e.code === 'KeyD') moveRight = false;
        });

        // Blok Etkileşimi
        const raycaster = new THREE.Raycaster();
        document.addEventListener('mousedown', (e) => {
            if(!controls.isLocked) return;
            raycaster.setFromCamera({x: 0, y: 0}, camera);
            const intersects = raycaster.intersectObjects(blocks);

            if (intersects.length > 0) {
                const intersect = intersects[0];
                if (e.button === 0) { // Kır
                    breakSound.play();
                    scene.remove(intersect.object);
                    blocks.splice(blocks.indexOf(intersect.object), 1);
                } else if (e.button === 2) { // Koy
                    placeSound.play();
                    const voxel = new THREE.Mesh(geometry, new THREE.MeshLambertMaterial({map: dirtTex}));
                    voxel.position.copy(intersect.object.position).add(intersect.face.normal);
                    scene.add(voxel);
                    blocks.push(voxel);
                }
            }
        });

        let prevTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (controls.isLocked) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 2.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 40.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 40.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                camera.position.y += (velocity.y * delta);

                // İçinden geçmeyi engellemek için basit zemin çarpışması
                if (camera.position.y < 2.2) {
                    velocity.y = 0;
                    camera.position.y = 2.2;
                    canJump = true;
                }
            }
            prevTime = time;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
