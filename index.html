<!DOCTYPE html>
<html>
<head>
    <title>Mini Minecraft HTML</title>
    <style>
        body { margin: 0; overflow: hidden; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            margin: -10px 0 0 -10px;
            color: white; font-family: sans-serif;
            text-align: center; line-height: 20px;
            pointer-events: none;
        }
        #info {
            position: absolute; top: 10px; left: 10px;
            color: white; background: rgba(0,0,0,0.5);
            padding: 10px; font-family: Arial;
        }
    </style>
</head>
<body>
    <div id="crosshair">+</div>
    <div id="info">WASD: Hareket | Mouse: Bakış | Sol Tık: Kır | Sağ Tık: Koy</div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

        // Sahne Ayarları
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Gökyüzü mavisi
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Işıklandırma
        const light = new THREE.AmbientLight(0x404040); 
        scene.add(light);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 0.5).normalize();
        scene.add(directionalLight);

        // Kontroller
        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => controls.lock());

        // Zemin ve Bloklar
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshLambertMaterial({ color: 0x55aa55 }); // Çim rengi
        
        // Basit bir 10x10 zemin oluştur
        for(let x = -5; x < 5; x++) {
            for(let z = -5; z < 5; z++) {
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(x, 0, z);
                scene.add(cube);
            }
        }

        camera.position.y = 2;
        camera.position.z = 5;

        // Hareket Mantığı
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const onKeyDown = (e) => {
            if(e.code === 'KeyW') moveForward = true;
            if(e.code === 'KeyS') moveBackward = true;
            if(e.code === 'KeyA') moveLeft = true;
            if(e.code === 'KeyD') moveRight = true;
        };
        const onKeyUp = (e) => {
            if(e.code === 'KeyW') moveForward = false;
            if(e.code === 'KeyS') moveBackward = false;
            if(e.code === 'KeyA') moveLeft = false;
            if(e.code === 'KeyD') moveRight = false;
        };
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // Blok Kırma/Koyma
        const raycaster = new THREE.Raycaster();
        document.addEventListener('mousedown', (e) => {
            if(!controls.isLocked) return;
            
            raycaster.setFromCamera({x: 0, y: 0}, camera);
            const intersects = raycaster.intersectObjects(scene.children);

            if (intersects.length > 0) {
                const intersect = intersects[0];
                if (e.button === 0) { // Sol Tık: Sil
                    scene.remove(intersect.object);
                } else if (e.button === 2) { // Sağ Tık: Ekle
                    const voxel = new THREE.Mesh(geometry, new THREE.MeshLambertMaterial({color: 0x8B4513}));
                    voxel.position.copy(intersect.object.position).add(intersect.face.normal);
                    scene.add(voxel);
                }
            }
        });

        // Render Döngüsü
        const velocity = new THREE.Vector3();
        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                const delta = 0.15;
                if (moveForward) controls.moveForward(delta);
                if (moveBackward) controls.moveForward(-delta);
                if (moveLeft) controls.moveRight(-delta);
                if (moveRight) controls.moveRight(delta);
            }
            renderer.render(scene, camera);
        }
        animate();

        // Pencere Boyutu Ayarı
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
